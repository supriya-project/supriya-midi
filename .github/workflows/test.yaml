name: Test

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
  - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Install supriya-midi
      run: uv sync
    - name: Format check
      run: uv run ruff format --check src/ tests/
    - name: Lint
      run: uv run ruff check src/ tests/
    - name: Type check
      run: uv run ty check src/ tests/

  package:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build wheels
      env:
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.build }}
      uses: pypa/cibuildwheel@v3.4.0
    - name: Upload wheels
      uses: actions/upload-artifact@v6
      with:
        name: wheel-${{ matrix.dist }}
        path: ./wheelhouse/*.whl
    strategy:
      fail-fast: false
      matrix:
        include:
        - {os: macos-15,         arch: x86_64, build: "cp3{10,11,12,13,14}-*",          dist: macos-amd}
        - {os: macos-15,         arch: arm64,  build: "cp3{10,11,12,13,14}-*",          dist: macos-arm}
        - {os: ubuntu-24.04,     arch: auto,   build: "cp3{10,11,12,13,14}-manylinux*", dist: manylinux-amd}
        - {os: ubuntu-24.04,     arch: auto,   build: "cp3{10,11,12,13,14}-musllinux*", dist: musllinux-amd}
        - {os: ubuntu-24.04-arm, arch: auto,   build: "cp3{10,11,12,13,14}-manylinux*", dist: manylinux-arm}
        - {os: ubuntu-24.04-arm, arch: auto,   build: "cp3{10,11,12,13,14}-musllinux*", dist: musllinux-arm}
        - {os: windows-latest,   arch: AMD64,  build: "cp3{10,11,12,13,14}-*",          dist: windows-amd}
        - {os: windows-latest,   arch: ARM64,  build: "cp3{10,11,12,13,14}-*",          dist: windows-arm}

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Install packages
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update --yes
          sudo apt-get install --yes libasound2-dev libjack-jackd2-dev
        fi
    - name: Sync
      run: uv sync
    - name: Pip install
      run: uv pip install -e . -v
    - name: Test
      run: uv run pytest -v
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04, windows-latest]
