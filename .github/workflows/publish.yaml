name: Publish
on:
  release:
    types: [released]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Sync
      run: uv sync
    - name: Build docs
      run: uv run make -C docs html
    - uses: actions/upload-artifact@v6
      with:
        name: docs
        path: ./docs/build/html/

  build-sdist:
    name: Build distribution archives
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Build sdist
      run: uv build --sdist
    - uses: actions/upload-artifact@v6
      with:
        name: dist-sdist
        path: dist/*.tar.gz

  build-wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Build wheels
      env:
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.build }}
      uses: pypa/cibuildwheel@v3.4.0
    - name: Upload wheels
      uses: actions/upload-artifact@v6
      with:
        name: dist-${{ matrix.dist }}
        path: ./wheelhouse/*.whl
    strategy:
      fail-fast: false
      matrix:
        include:
        - {os: macos-15,         arch: x86_64, build: "cp3{10,11,12,13,14}-*",          dist: macos-amd}
        - {os: macos-15,         arch: arm64,  build: "cp3{10,11,12,13,14}-*",          dist: macos-arm}
        - {os: ubuntu-24.04,     arch: auto,   build: "cp3{10,11,12,13,14}-manylinux*", dist: manylinux-amd}
        - {os: ubuntu-24.04,     arch: auto,   build: "cp3{10,11,12,13,14}-musllinux*", dist: musllinux-amd}
        - {os: ubuntu-24.04-arm, arch: auto,   build: "cp3{10,11,12,13,14}-manylinux*", dist: manylinux-arm}
        - {os: ubuntu-24.04-arm, arch: auto,   build: "cp3{10,11,12,13,14}-musllinux*", dist: musllinux-arm}
        - {os: windows-latest,   arch: AMD64,  build: "cp3{10,11,12,13,14}-*",          dist: windows-amd}
        - {os: windows-latest,   arch: ARM64,  build: "cp3{10,11,12,13,14}-*",          dist: windows-arm}

  upload-to-testpypi:
    name: Publish release to Test PyPI
    environment: testpypi
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        merge-multiple: true
        path: dist
        pattern: dist-*
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  upload-to-pypi:
    name: Publish release to PyPI
    environment: pypi
    needs: [build-wheels, build-sdist, upload-to-testpypi]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        merge-multiple: true
        path: dist
        pattern: dist-*
    - uses: pypa/gh-action-pypi-publish@release/v1

  update-gh-pages:
    name: Update gh-pages
    needs: [upload-to-pypi]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: docs
        path: docs
    - uses: actions/checkout@v6
      with:
        path: gh-pages
        ref: gh-pages
    - name: Rsync docs
      run: rsync -rtv --del --exclude=.git docs/ gh-pages/
    - name: Touch .nojekyll
      run: touch gh-pages/.nojekyll
    - uses: peaceiris/actions-gh-pages@v4.0.0
      with:
        allow_empty_commit: true
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: gh-pages
        user_name: github-actions[bot]
        user_email: github-actions[bot]@users.noreply.github.com
